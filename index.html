<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horseshoe Mania - Blue Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f0f7ff; font-family: -apple-system, sans-serif; }
        .card { background: white; border-radius: 16px; box-shadow: 0 4px 20px rgba(30, 58, 138, 0.08); }
        .blue-gradient { background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%); }
        input[type="number"] { -moz-appearance: textfield; border-bottom: 2px solid #e2e8f0; }
        input:focus { border-color: #3b82f6; outline: none; }
    </style>
</head>
<body class="pb-24">

    <!-- HEADER -->
    <div class="blue-gradient text-white p-8 shadow-xl mb-6 text-center rounded-b-[40px]">
        <h1 class="text-4xl font-black italic tracking-tighter">HORSESHOE MANIA</h1>
        <p class="text-[10px] opacity-70 uppercase tracking-[0.3em] font-bold mt-1">Tournament Director Pro</p>
    </div>

    <div id="app" class="max-w-xl mx-auto px-4">
        <!-- Dynamic Content -->
    </div>

    <!-- NAVIGATION -->
    <nav id="navbar" class="fixed bottom-0 left-0 right-0 bg-white border-t border-blue-50 flex justify-around hidden shadow-[0_-10px_25px_rgba(0,0,0,0.05)]">
        <button onclick="renderSetup()" class="p-4 text-slate-400 flex flex-col items-center flex-1 text-[10px] font-bold uppercase tracking-widest">
            <span class="text-xl mb-1">⚙️</span>Setup
        </button>
        <button onclick="renderMatches()" class="p-4 text-slate-400 flex flex-col items-center flex-1 text-[10px] font-bold uppercase tracking-widest border-x border-slate-50">
            <span class="text-xl mb-1">🎯</span>Matches
        </button>
        <button onclick="renderStandings()" class="p-4 text-slate-400 flex flex-col items-center flex-1 text-[10px] font-bold uppercase tracking-widest">
            <span class="text-xl mb-1">🏆</span>Standings
        </button>
    </nav>

    <script>
        // --- DATA STATE ---
        let players = [];
        let config = { 
            rounds: 7, target: 21, max: 26, courts: 4, 
            entryFee: 20, payoutPercent: 80, payouts: 3 
        };
        let roundHistory = [];
        let currentViewRound = 1;
        let tournamentStarted = false;

        function init() { renderSetup(); }

        // --- SETUP VIEW ---
        function renderSetup() {
            const playerRows = players.map((p, i) => `
                <div class="flex justify-between items-center py-3 border-b border-slate-50">
                    <span class="${p.paid ? 'font-bold text-blue-900' : 'text-slate-300 italic'} text-sm">${p.name}</span>
                    <div class="flex gap-3">
                        <button onclick="togglePaid(${i})" class="text-[10px] px-4 py-1.5 rounded-full font-black transition ${p.paid ? 'bg-blue-600 text-white shadow-lg' : 'bg-slate-100 text-slate-400'}">
                            ${p.paid ? 'PAID' : 'UNPAID'}
                        </button>
                        <button onclick="removePlayer(${i})" class="text-slate-200 hover:text-red-400 px-1 font-bold">✕</button>
                    </div>
                </div>
            `).join('');

            document.getElementById('app').innerHTML = `
                <div class="space-y-6">
                    <div class="card p-6">
                        <h2 class="text-xs font-black text-blue-800 uppercase mb-4 tracking-widest flex items-center gap-2">
                            <span class="bg-blue-100 p-1 rounded">⚙️</span> Game Settings
                        </h2>
                        <div class="grid grid-cols-2 gap-6 mb-6">
                            <div>
                                <label class="text-[10px] font-bold text-slate-400 uppercase">Total Rounds</label>
                                <input type="number" onchange="config.rounds=parseInt(this.value)" value="${config.rounds}" class="w-full p-2 text-lg font-bold">
                            </div>
                            <div>
                                <label class="text-[10px] font-bold text-slate-400 uppercase">Courts</label>
                                <input type="number" onchange="config.courts=parseInt(this.value)" value="${config.courts}" class="w-full p-2 text-lg font-bold">
                            </div>
                        </div>

                        <label class="text-[10px] font-bold text-slate-400 uppercase block mb-3">Score Cap (Target/Max)</label>
                        <div class="flex gap-2">
                            ${[15, 21, 25].map(t => {
                                const m = t === 15 ? 20 : (t === 21 ? 26 : 30);
                                return `<button onclick="setScore(${t},${m})" class="flex-1 py-3 text-xs font-black rounded-xl border-2 transition ${config.target==t ? 'border-blue-600 bg-blue-50 text-blue-700 shadow-sm' : 'border-slate-100 text-slate-400'}">${t}/${m}</button>`;
                            }).join('')}
                        </div>
                    </div>

                    <div class="card p-6">
                        <h2 class="text-xs font-black text-blue-800 uppercase mb-4 tracking-widest flex items-center gap-2">
                            <span class="bg-blue-100 p-1 rounded">💰</span> Money & Payouts
                        </h2>
                        <div class="grid grid-cols-3 gap-4">
                            <div>
                                <label class="text-[10px] font-bold text-slate-400 uppercase">Entry $</label>
                                <input type="number" onchange="config.entryFee=this.value" value="${config.entryFee}" class="w-full p-2 font-black text-blue-900">
                            </div>
                            <div>
                                <label class="text-[10px] font-bold text-slate-400 uppercase">Payout %</label>
                                <input type="number" onchange="config.payoutPercent=this.value" value="${config.payoutPercent}" class="w-full p-2 font-black text-blue-900">
                            </div>
                            <div>
                                <label class="text-[10px] font-bold text-slate-400 uppercase">Places Paid</label>
                                <input type="number" onchange="config.payouts=this.value" value="${config.payouts}" class="w-full p-2 font-black text-blue-900">
                            </div>
                        </div>
                    </div>

                    <div class="card p-6">
                        <h2 class="text-xs font-black text-blue-800 uppercase mb-4 tracking-widest border-b border-slate-100 pb-2">Players (${players.length})</h2>
                        <div class="flex gap-3 mb-4">
                            <input type="text" id="pName" placeholder="Player name..." class="flex-grow bg-slate-50 p-4 rounded-2xl outline-none focus:ring-2 ring-blue-400 font-bold">
                            <button onclick="addPlayer()" class="blue-gradient text-white px-8 rounded-2xl font-black text-2xl shadow-lg">+</button>
                        </div>
                        <div class="max-h-60 overflow-y-auto">${playerRows || '<p class="text-center text-slate-300 py-6 italic text-sm">Add players to begin</p>'}</div>
                    </div>

                    <button onclick="startTournament()" class="w-full blue-gradient text-white py-6 rounded-[24px] font-black text-xl shadow-2xl hover:scale-[1.02] transition transform active:scale-95 mb-10">
                        ${tournamentStarted ? 'BACK TO ACTION' : 'LAUNCH MANIA'}
                    </button>
                </div>
            `;
            if(tournamentStarted) document.getElementById('navbar').classList.remove('hidden');
        }

        // --- CORE FUNCTIONS ---
        function addPlayer() {
            const el = document.getElementById('pName');
            if (el.value) {
                players.push({ name: el.value, paid: false });
                el.value = ""; el.focus();
                renderSetup();
            }
        }
        function togglePaid(i) { players[i].paid = !players[i].paid; renderSetup(); }
        function removePlayer(i) { players.splice(i, 1); renderSetup(); }
        function setScore(t, m) { config.target = t; config.max = m; renderSetup(); }

        function startTournament() {
            const paid = players.filter(p => p.paid);
            if (paid.length < 2) return alert("You need more paid players!");
            if (!tournamentStarted) {
                tournamentStarted = true;
                generateRound(1);
            }
            renderMatches();
            document.getElementById('navbar').classList.remove('hidden');
        }

        function generateRound(roundNum) {
            const active = players.filter(p => p.paid).sort(() => Math.random() - 0.5);
            let pool = [...active];
            let matches = [];
            let byePlayer = null;

            if (pool.length % 2 !== 0) byePlayer = pool.pop();

            let pairs = [];
            for (let i = 0; i < pool.length; i += 2) {
                pairs.push([pool[i], pool[i+1]]);
            }

            let pairIdx = 0;
            for (let c = 1; c <= config.courts; c++) {
                if (pairIdx < pairs.length) {
                    let t1 = pairs[pairIdx++];
                    let t2 = pairs[pairIdx++];
                    if (t1 && t2) {
                        matches.push({ court: c, t1, t2, s1: null, s2: null, type: 'Doubles' });
                    } else if (t1) {
                        matches.push({ court: c, t1: [t1[0]], t2: [t1[1]], s1: null, s2: null, type: 'Singles' });
                    }
                }
            }
            roundHistory[roundNum - 1] = { matches, byePlayer };
            currentViewRound = roundNum;
        }

        function renderMatches() {
            const roundData = roundHistory[currentViewRound - 1];
            const isCompleted = roundData.matches.every(m => m.s1 !== null);

            const matchCards = roundData.matches.map((m, i) => `
                <div class="card p-6 border-l-[10px] ${m.s1 !== null ? 'border-blue-500 bg-blue-50/20' : 'border-slate-200'} mb-5 transition active:scale-[0.97]" onclick="editScore(${i})">
                    <div class="flex justify-between items-center mb-4">
                        <span class="text-[10px] font-black text-blue-300 uppercase tracking-widest">Court ${m.court}</span>
                        <span class="text-[9px] font-bold bg-white border border-blue-100 px-3 py-1 rounded-full text-blue-500 uppercase tracking-tighter">${m.type} Match</span>
                    </div>
                    <div class="flex justify-between items-center gap-2">
                        <div class="w-5/12 text-sm font-black text-blue-900 leading-tight">${m.t1.map(p => p.name).join('<br>')}</div>
                        <div class="w-2/12 text-center text-3xl font-black ${m.s1 !== null ? 'text-blue-600' : 'text-slate-200 tracking-tighter'}">
                            ${m.s1 !== null ? `${m.s1}-${m.s2}` : 'VS'}
                        </div>
                        <div class="w-5/12 text-right text-sm font-black text-blue-900 leading-tight">${m.t2.map(p => p.name).join('<br>')}</div>
                    </div>
                </div>
            `).join('');

            document.getElementById('app').innerHTML = `
                <div class="flex justify-between items-center mb-6 bg-white p-4 rounded-3xl shadow-sm">
                    <button onclick="changeRoundView(-1)" class="p-3 bg-blue-50 rounded-2xl text-xl">⬅️</button>
                    <div class="text-center">
                        <p class="text-[9px] font-black text-blue-300 uppercase tracking-widest">Mania Round</p>
                        <h2 class="text-3xl font-black text-blue-900 leading-none">${currentViewRound}</h2>
                    </div>
                    <button onclick="changeRoundView(1)" class="p-3 bg-blue-50 rounded-2xl text-xl">➡️</button>
                </div>

                ${roundData.byePlayer ? `
                    <div class="bg-blue-900 text-white p-4 rounded-2xl text-center text-xs font-bold mb-5 shadow-xl flex items-center justify-center gap-3">
                        <span class="text-lg">🍺</span> ODD MAN OUT: ${roundData.byePlayer.name}
                    </div>
                ` : ''}

                ${matchCards}

                ${(currentViewRound === roundHistory.length && isCompleted) ? `
                    <button onclick="nextRoundBtn()" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-black mt-4 shadow-xl shadow-blue-200 transform hover:-translate-y-1 transition">
                        ${currentViewRound >= config.rounds ? '🏆 VIEW FINAL STANDINGS' : '🚀 START NEXT ROUND'}
                    </button>
                ` : ''}
            `;
        }

        function editScore(idx) {
            const m = roundHistory[currentViewRound - 1].matches[idx];
            const s1 = prompt(`Score for Team 1:`, m.s1 ?? "");
            const s2 = prompt(`Score for Team 2:`, m.s2 ?? "");
            if (s1 !== null && s2 !== null) {
                m.s1 = Math.min(parseInt(s1) || 0, config.max);
                m.s2 = Math.min(parseInt(s2) || 0, config.max);
                renderMatches();
            }
        }

        function changeRoundView(dir) {
            const newR = currentViewRound + dir;
            if (newR > 0 && newR <= roundHistory.length) {
                currentViewRound = newR;
                renderMatches();
            }
        }

        function nextRoundBtn() {
            if (roundHistory.length < config.rounds) {
                generateRound(roundHistory.length + 1);
                renderMatches();
            } else {
                renderStandings();
            }
        }

        // --- SMART PAYOUT LOGIC ---
        function renderStandings() {
            let standings = players.filter(p => p.paid).map(p => ({ ...p, total: 0, rds: 0 }));
            
            roundHistory.forEach(round => {
                let roundMin = 999;
                round.matches.forEach(m => {
                    if (m.s1 === null) return;
                    if (m.s1 < roundMin) roundMin = m.s1;
                    if (m.s2 < roundMin) roundMin = m.s2;
                    m.t1.forEach(p => { let s = standings.find(s => s.name === p.name); s.total += m.s1; s.rds++; });
                    m.t2.forEach(p => { let s = standings.find(s => s.name === p.name); s.total += m.s2; s.rds++; });
                });
                if (round.byePlayer) {
                    let s = standings.find(s => s.name === round.byePlayer.name);
                    s.total += (roundMin === 999 ? 0 : roundMin);
                    s.rds++;
                }
            });

            standings.sort((a, b) => b.total - a.total);

            // PAYOUT ENGINE
            const totalPot = standings.length * config.entryFee;
            const targetPrizePool = totalPot * (config.payoutPercent / 100);
            
            // Percentage weights for top 5 spots
            const weights = [0.55, 0.28, 0.12, 0.05, 0.02]; 
            let totalDistributed = 0;

            const payoutRows = [];
            const numWinners = Math.min(config.payouts, standings.length);
            
            for(let i=0; i < numWinners; i++) {
                // Initial split based on weights
                let raw = targetPrizePool * (weights[i] / weights.slice(0, numWinners).reduce((a, b) => a + b, 0));
                
                // SMART ROUNDING LOGIC
                // Decide between rounding to $5 or $10 based on size of prize
                let roundingFactor = raw > 100 ? 10 : 5;
                let rounded = Math.floor(raw / roundingFactor) * roundingFactor;
                
                totalDistributed += rounded;
                payoutRows.push(`
                    <div class="flex justify-between items-center py-1">
                        <span class="text-blue-200 text-xs">${i+1}${['st','nd','rd'][i]||'th'} - ${standings[i].name}</span>
                        <span class="font-black text-green-400">$${rounded}</span>
                    </div>
                `);
            }
            const actualHouseTake = totalPot - totalDistributed;

            const leaderboardRows = standings.map((p, i) => `
                <tr class="border-b border-slate-50">
                    <td class="p-4 text-[10px] font-black text-slate-300">${i+1}</td>
                    <td class="p-4 text-sm font-black text-blue-900">${p.name}</td>
                    <td class="p-4 text-blue-600 font-black text-right text-lg">${p.total}</td>
                    <td class="p-4 text-[10px] text-slate-300 text-right">${p.rds} rds</td>
                </tr>
            `).join('');

            document.getElementById('app').innerHTML = `
                <div class="card p-8 mb-6 bg-blue-900 text-white shadow-2xl relative overflow-hidden">
                    <div class="absolute -right-4 -top-4 text-8xl opacity-10 rotate-12">🏦</div>
                    <h2 class="text-xs uppercase font-black text-blue-400 mb-6 tracking-widest border-b border-blue-800 pb-2">Final Financials</h2>
                    <div class="grid grid-cols-2 gap-8 mb-6">
                        <div><p class="text-[9px] text-blue-300 uppercase font-bold mb-1">Total Pot Collected</p><p class="text-3xl font-black">$${totalPot}</p></div>
                        <div><p class="text-[9px] text-blue-300 uppercase font-bold mb-1">House Total (Breakage)</p><p class="text-3xl font-black text-green-400">$${actualHouseTake}</p></div>
                    </div>
                    <div class="space-y-2 border-t border-blue-800 pt-6">
                        <p class="text-[9px] text-blue-400 font-black uppercase mb-2 tracking-widest">Individual Payouts</p>
                        ${payoutRows.join('')}
                    </div>
                    <p class="text-[8px] text-blue-500 mt-6 italic">* Prizes automatically rounded to the nearest $5 or $10 for easier payment.</p>
                </div>

                <div class="card overflow-hidden shadow-xl mb-10">
                    <table class="w-full text-left">
                        <thead class="bg-blue-50 text-[10px] font-black uppercase text-blue-400">
                            <tr><th class="p-4">#</th><th class="p-4">Player</th><th class="p-4 text-right">Points</th><th class="p-4 text-right">Activity</th></tr>
                        </thead>
                        <tbody>${leaderboardRows}</tbody>
                    </table>
                </div>
                
                <button onclick="if(confirm('Clear all data?')) location.reload()" class="w-full py-8 text-slate-300 text-[10px] font-black uppercase tracking-[0.4em]">Full Reset</button>
            `;
        }

        init();
    </script>
</body>
</html>
